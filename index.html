<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Found & Proof</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Верхняя панель -->
    <div class="top-bar">
        <span>Бесплатная доставка от 3000₽</span>
        <span>Проверка подлинности</span>
        <span>Возврат 14 дней</span>
    </div>

    <!-- Шапка -->
    <header class="header">
        <div class="logo">
            <img src="logo.png" alt="logo">
            <div>
                <h2>Found & Proof</h2>
                <p>wear with confidence</p>
            </div>
        </div>

        <nav>
            <a href="#">Мужчинам</a>
            <a href="#">Женщинам</a>
            <a href="#">Новинки</a>
            <a href="#">Бренды</a>
        </nav>
    </header>

    <!-- Главный блок -->
    <section class="hero">
        <div class="hero-text">
            <h1>Found <span>& Proof</span></h1>
            <p>Одежда, которой можно доверять</p>
            <p class="sub">
                Новая и б/у одежда с гарантией подлинности
            </p>

            <div class="buttons">
                <button class="btn-main">Смотреть каталог</button>
                <button class="btn-secondary">Как работает проверка?</button>
            </div>
        </div>

        <div class="hero-logo">
            <img src="logo.png">
        </div>
    </section>

    <!-- Каталог -->
    <section class="catalog">
        <h2>Популярные товары</h2>

        <div class="cards">

            <div class="card">
                <img src="photo.png">
                <h3>Худи</h3>
                <p>4500₽</p>
            </div>

            <div class="card">
                <img src="photo.png">
                <h3>Куртка</h3>
                <p>8900₽</p>
            </div>

            <div class="card">
                <img src="photo.png">
                <h3>Кроссовки</h3>
                <p>12000₽</p>
            </div>

        </div>
    </section>

</body>
</html>
